<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparar vehículos — CATO Group</title>
    <meta name="description" content="Compará lado a lado los vehículos seleccionados del catálogo de CATO Group: precio, año, kilometraje, combustible y equipamiento.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <img class="logo-icon" src="logo.svg" alt="" aria-hidden="true">
                <span class="brand-text">
                    <span class="brand-name">CATO</span><span class="brand-sub">Group</span>
                </span>
            </a>
            <button class="navbar-toggle" id="navbarToggle" aria-label="Abrir menú">☰</button>
            <ul class="navbar-menu" id="navbarMenu"></ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <a href="cars.html" class="btn btn-ghost btn-sm" style="margin-bottom: 1rem;">← Volver al catálogo</a>
            <h1 class="section-title">Comparación de vehículos</h1>
            <p class="section-subtitle">Analizá las principales características de los autos seleccionados.</p>

            <div style="overflow-x: auto;">
                <table class="compare-table" id="compareTable">
                    <thead>
                        <tr id="compareHeader"></tr>
                    </thead>
                    <tbody id="compareBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="site-footer-bottom">
            &copy; 2026 CATO Group — Agencia Multimarca
