<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis publicaciones — Cato Group</title>
    <meta name="description" content="Gestioná tus publicaciones de vehículos: editá precios, actualizá descripciones y eliminá unidades ya vendidas.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <span class="logo-icon" aria-hidden="true">CT</span>
                <span class="brand-text">
                    <span class="brand-name">Cato</span><span class="brand-sub">Group</span>
                </span>
            </a>
            <button class="navbar-toggle" id="navbarToggle" aria-label="Abrir menú">☰</button>
            <ul class="navbar-menu" id="navbarMenu"></ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="flex-row" style="justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap;">
                <div>
                    <h1 class="section-title" style="margin-bottom: 0.3rem;">Mis publicaciones</h1>
                    <p class="section-subtitle" style="margin-bottom: 0;">Administrá los vehículos que publicaste en Cato Group.</p>
                </div>
                <a href="publish.html" class="btn btn-primary">+ Publicar nuevo vehículo</a>
            </div>

            <div id="feedback" style="margin-top: 1rem;"></div>

            <section id="publicacionesContainer" class="publicaciones-grid">
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <div class="empty-icon">⏳</div>
                    <h3>Cargando tus publicaciones...</h3>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal de edición -->
    <div id="editModal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-labelledby="editModalTitle">
            <div class="modal-header">
                <h2 id="editModalTitle">Editar publicación</h2>
                <button class="modal-close" id="editModalClose" aria-label="Cerrar">×</button>
            </div>
            <form id="editForm" class="modal-body">
                <input type="hidden" id="editId">
                <div id="editFeedback"></div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editPrecio">Precio (USD)</label>
                        <input type="number" id="editPrecio" min="0" step="1" required>
                    </div>
                    <div class="form-group">
                        <label for="editKilometraje">Kilometraje</label>
                        <input type="number" id="editKilometraje" min="0" step="1">
                    </div>
                    <div class="form-group">
                        <label for="editUbicacion">Ubicación</label>
                        <input type="text" id="editUbicacion" maxlength="150">
                    </div>
                    <div class="form-group">
                        <label for="editAnio">Año</label>
                        <input type="number" id="editAnio" min="1900" max="2030">
                    </div>
                </div>
                <div class="form-group">
                    <label for="editDescripcion">Descripción</label>
                    <textarea id="editDescripcion" rows="4" maxlength="2000"></textarea>
                </div>
                <div class="flex-row" style="justify-content: flex-end; gap: 0.6rem;">
                    <button type="button" class="btn btn-ghost" id="editCancelBtn">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="editSaveBtn">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <div class="site-footer-bottom">
            &copy; 2026 Cato Group — Agencia Multimarca
        </div>
    </footer>

    <script src="app.js"></script>
    <script src="mis-publicaciones.js"></script>
</body>
</html>
