<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis consultas — Cato Group</title>
    <meta name="description" content="Tu historial de consultas enviadas en Cato Group y las respuestas recibidas de los vendedores.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-container">

                <span class="logo-icon" aria-hidden="true">CT</span>
                <span class="brand-text">
                    <span class="brand-name">Cato</span><span class="brand-sub">Group</span>
                </span>
            </a>
            <button class="navbar-toggle" id="navbarToggle" aria-label="Abrir menú">☰</button>
            <ul class="navbar-menu" id="navbarMenu"></ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <h1 class="section-title">Mis consultas</h1>
            <p class="section-subtitle">Las consultas que enviaste a los vendedores y las respuestas que te devolvieron. Podés seguir la conversación desde acá.</p>

            <div id="feedback"></div>

                    <div class="empty-icon">📨</div>
                    <h3>Cargando tus consultas...</h3>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="site-footer-bottom">
            &copy; 2026 Cato Group — Agencia Multimarca
        </div>
    </footer>

    <script src="app.js"></script>
